version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Europe/Prague"
    open-pull-requests-limit: 3
    # Reviewers řízeni přes .github/CODEOWNERS
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      major-dotnet-platform:
        patterns:
          - "Microsoft.AspNetCore.*"
          - "Microsoft.EntityFrameworkCore.*"
          - "Microsoft.Extensions.*"
          - "System.*"
        exclude-patterns:
          - "Microsoft.ApplicationInsights"
        update-types:
          - "major"
      major-other:
        patterns:
          - "*"
        exclude-patterns:
          - "Microsoft.AspNetCore.*"
          - "Microsoft.EntityFrameworkCore.*"
          - "Microsoft.Extensions.*"
          - "System.*"
          - "Microsoft.ApplicationInsights"
        update-types:
          - "major"